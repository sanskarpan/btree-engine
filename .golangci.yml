version: "2"

linters:
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # SA* checks
    - ineffassign    # unused assignments
    - unused         # unused code
    - misspell       # spelling
    - revive         # idiomatic Go style
    - gocritic       # additional checks
    - noctx          # http calls without context
    - bodyclose      # http response body close
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false     # allow intentional _

    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: unused-parameter
        - name: unreachable-code

    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - commentedOutCode
        - whyNoLint
        - builtinShadow
        - builtinShadowDecl
        - exitAfterDefer
        - httpNoBody
        - ifElseChain
        - octalLiteral
        - paramTypeCombine
        - unnamedResult
  exclusions:
    rules:
      # Ignore errcheck for test helper calls that never fail in practice.
      - path: _test\.go
        linters: [errcheck]
      # Ignore unused linter for exported symbols (they are used by callers).
      - linters: [unused]
        source: "^func (New|Open)"
      # Allow nolint in merge/split where InsertRecord errors are handled above.
      - text: "nolint"
        linters: [revive]

formatters:
  enable:
    - gofmt          # formatting
    - goimports      # import ordering
  settings:
    gofmt:
      simplify: true

    goimports:
      local-prefixes:
        - btree-engine

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
